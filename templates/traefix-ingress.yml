apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.metadata.name }}
  namespace: {{ .Values.ingress.metadata.namespace }} # 👈 Précisément dans ton namespace de travail !
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }} # 👈 Dit à Traefik de prendre les commandes
  rules:
  - http:
      paths:
      - path: {{ .Values.ingress.path }} # 👈 Le chemin que tu veux exposer
        pathType: {{ .Values.ingress.pathType }} # 👈 Le type de chemin que tu veux exposer
        backend:
          service:
            name: {{ .Values.ingress.serviceName }}
            port:
              number: {{ .Values.ingress.portNumber }}