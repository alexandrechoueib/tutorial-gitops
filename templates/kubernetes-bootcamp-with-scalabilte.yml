apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{  .Values.tutorialApp.appName }}
  namespace: {{ .Values.tutorialApp.namespace }}
  labels:
    app: {{  .Values.tutorialApp.appName }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.tutorialApp.deployment.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: {{  .Values.tutorialApp.appName }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{  .Values.tutorialApp.appName }}
    spec:
      containers:
      - image: {{ .Values.tutorialApp.deployment.image }}
        imagePullPolicy: IfNotPresent
        name: {{  .Values.tutorialApp.appName }}
        resources:
          limits:
            cpu: "1"
          requests:
            cpu: 100m
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
